openapi: 3.0.2
info:
  title: Bibliotopia Storage API
  version: 1.0.0
  description: API for uploading files to different storages
  contact:
    name: Vitalii Fedyk
    email: fedykvitalik2004@gmail.com
paths:
  /storage:
    post:
      summary: Upload a file to a specified storage backend
      operationId: uploadFile
      parameters:
        - $ref: '#/components/parameters/XAppName'
      tags:
        - Storage
      requestBody:
        $ref: '#/components/requestBodies/UploadFile'
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageInfo'
  /storage/{fileId}:
    get:
      summary: Get a file information by its ID
      operationId: findById
      parameters:
        - $ref: '#/components/parameters/XAppName'
        - $ref: '#/components/parameters/uploadId'
      tags:
        - Storage
      responses:
        '200':
          description: File retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageInfo'
        '404':
          description: File not found
  /storage/download:
    get:
      summary: Download a ZIP file
      parameters:
        - $ref: '#/components/parameters/XAppName'
      operationId: downloadZip
      tags:
        - Storage
      responses:
        '200':
          description: ZIP file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /storage/initiate:
    post:
      summary: Initiate a multipart upload
      description: Tells MinIO to prepare for a multi-chunk upload. Returns a unique uploadId.
      operationId: initiateUpload
      tags:
        - Storage
      parameters:
        - $ref: '#/components/parameters/XAppName'
        - name: fileName
          in: query
          required: true
          description: The name of the file to be uploaded.
          schema:
            type: string
            example: "large-video.mp4"
      responses:
        '200':
          description: Upload session initiated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateUploadResponse'
        '500':
          description: Failed to communicate with MinIO storage.
  /api/files/upload-chunk:
    post:
      summary: Upload a file chunk
      description: |
        Receives a single chunk of a large file (up to 50GB total) and streams it directly to MinIO. 
        Returns the ETag generated by MinIO for this specific part.
      operationId: uploadChunk
      tags:
        - Storage
      parameters:
        - $ref: '#/components/parameters/XAppName'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The binary data for this chunk (slice of the file).
                meta:
                  $ref: '#/components/schemas/ChunkUploadRequest'
              required:
                - file
                - uploadId
                - chunkNumber
                - fileName
      responses:
        '200':
          description: Chunk uploaded successfully.
          content:
            text/plain:
              schema:
                type: string
                description: The ETag for the uploaded part.
                example: "70ee0f3312624217aa0334b7f405c879"
        '400':
          description: Invalid parameters or part size (MinIO requires min 5MB).
        '500':
          description: Internal server error or MinIO connection failure.
  /api/files/complete:
    post:
      summary: Finalize multipart upload
      description: |
        Stitches all uploaded chunks together in the storage backend. 
        MinIO/S3 will verify each ETag before creating the final object.
      operationId: completeUpload
      tags:
        - Storage
      parameters:
        - $ref: '#/components/parameters/XAppName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteRequest'
      responses:
        '200':
          description: File retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageInfo'
        '400':
          description: |
            Bad Request. Possible reasons:
            - Incorrect order of ETags.
            - Missing chunk ETags.
            - A chunk (except the last) is smaller than 5MB.
        '500':
          description: Storage backend failed to merge the file.
  /generation/barcodes/{isbn}:
    post:
      summary: Generate and save a barcode image for an ISBN
      operationId: generateBarcode
      parameters:
        - name: isbn
          in: path
          required: true
          description: ISBN-13 code to generate a barcode for
          schema:
            type: string
            pattern: '^[0-9]{13}$'
      tags:
        - Generation
      responses:
        '200':
          description: Barcode generated and stored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    example: "Url"
        '400':
          description: Invalid ISBN
components:
  parameters:
    XAppName:
      name: X-App-Name
      description: Name of the application making the request. It is required
      in: header
      schema:
        type: string
    uploadId:
      name: fileId
      in: path
      description: The unique ID of the file
      required: true
      schema:
        type: string
        format: uuid
  requestBodies:
    UploadFile:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
            properties:
              file:
                type: string
                format: binary
                description: The file to upload
  schemas:
    DownloadZipRequest:
      type: object
      required:
        - ids
      properties:
        storageInfoIds:
          type: array
          items:
            type: string
            format: uuid
    StorageInfo:
      type: object
      required:
        - id
        - bucketName
        - objectName
        - url
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Id
        bucketName:
          type: string
          description: App name
        objectName:
          type: string
          description: Key of the file
        url:
          type: string
          format: string
          description: Public or signed URL to access the object. It is temporary.
        createdAt:
          type: string
          format: date-time
          description: ISO 8601/RFC 3339 timestamp with timezone (e.g., 2025-09-07T18:25:43+03:00)
    InitiateUploadResponse:
      type: object
      properties:
        storageInfoId:
          type: string
          format: uuid
        fileName:
          type: string
          example: "data-archive-50gb.zip"
        uploadId:
          type: string
          example: "YzRiMzQyZjAtYT..."
    ChunkUploadRequest:
      type: object
      properties:
        chunkSize:
          type: integer
        uploadId:
          type: string
          example: "YzRiMzQyZjAtYT..."
        chunkNumber:
          type: integer
          example: 0
        fileName:
          type: string
          example: "data-archive-50gb.zip"
      required:
        - uploadId
        - chunkNumber
        - fileName
    CompleteRequest:
      type: object
      required:
        - uploadId
        - fileName
        - parts
      properties:
        uploadId:
          type: string
          description: The unique session ID returned by the /initiate endpoint.
          example: "YzRiMzQyZjAtYT..."
        fileName:
          type: string
          description: The final name (Key) of the object in the storage bucket.
          example: "archive_50gb.zip"
        parts:
          type: array
          description: An ordered list of chunk metadata.
          items:
            $ref: '#/components/schemas/PartEtag'
    PartEtag:
      type: object
      required:
        - partNumber
        - etag
      properties:
        partNumber:
          type: integer
          description: The 1-based index of the chunk (order matters!).
          example: 1
        etag:
          type: string
          description: The ETag string returned by the storage after uploading the chunk.
          example: "70ee0f3312624217aa0334b7f405c879"