services:
  app_db:
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user-pwd
      POSTGRES_DB: bibliotopia
    volumes:
      - ./boot/src/test/resources/docker/postgres_init:/docker-entrypoint-initdb.d/
  minio:
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: password